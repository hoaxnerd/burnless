# Burnless — Local Development Stack
# Usage: docker compose up -d
#
# Starts Postgres only (the monorepo dev database).
# AI: the app uses your HOST Ollama at localhost:11434, or set a cloud provider key.
# Email: dev defaults to the console provider (emails logged to stdout) — no SMTP needed.
#
# Redis is OPTIONAL and only used by the hosted/cloud rate-limiter; self-host falls
# back to an in-memory limiter when REDIS_URL is unset. Start it with the cloud profile:
#   docker compose --profile cloud up -d
#
# NOTE: standalone self-host needs NO Docker at all (embedded PGLite). This stack is
# for monorepo development and the cloud/heavy deployment path.

services:
  # ── Database (PostgreSQL + pgvector) ────────────────────────────────────────
  # pgvector image includes the vector extension for semantic search / embeddings.
  # No separate search service needed — pgvector handles it within PostgreSQL.
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: burnless
      POSTGRES_PASSWORD: burnless
      POSTGRES_DB: burnless
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burnless"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Cache / Rate-limit backend (cloud-only; OPTIONAL) ───────────────────────
  # Self-host uses an in-memory limiter; Redis is only for the hosted/cloud path.
  # Start with: docker compose --profile cloud up -d
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["cloud"]
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
