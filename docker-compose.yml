# Burnless — Local Development Stack
# Usage: docker compose up -d
#
# Default: starts core infra only (Postgres, Redis, Mailpit).
# The app connects to your HOST Ollama at localhost:11434 — no Docker Ollama needed
# if you already have Ollama running locally.
#
# For devs without local Ollama:
#   docker compose --profile ollama up -d
# This starts a containerized Ollama + auto-pulls models.

services:
  # ── Database (PostgreSQL + pgvector) ────────────────────────────────────────
  # pgvector image includes the vector extension for semantic search / embeddings.
  # No separate search service needed — pgvector handles it within PostgreSQL.
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: burnless
      POSTGRES_PASSWORD: burnless
      POSTGRES_DB: burnless
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burnless"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Cache / Job Queue ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Local LLM (Ollama) — OPTIONAL ──────────────────────────────────────────
  # Only needed if you don't have Ollama running on your host machine.
  # Start with: docker compose --profile ollama up -d
  # The app defaults to localhost:11434 which hits your host Ollama.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Auto-pull the chat + embedding models on first boot
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "ollama pull gemma3:12b && ollama pull nomic-embed-text"]
    environment:
      OLLAMA_HOST: http://ollama:11434

  # ── Email (Mailpit) ────────────────────────────────────────────────────────
  # Web UI: http://localhost:8025
  # SMTP: localhost:1025 (no auth required)
  # Production: switch to Resend, SendGrid, or SES
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  ollama_models:
