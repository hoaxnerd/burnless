name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.26.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run engine tests
        run: pnpm --filter @burnless/engine test

      - name: Run web tests
        run: pnpm --filter @burnless/web test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-unit]
    env:
      # Stub env vars required by Next.js build (not real secrets)
      DATABASE_URL: "postgresql://stub:stub@localhost:5432/stub"
      NEXTAUTH_SECRET: "ci-build-stub-secret-not-real"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 1

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/burnless_test"
      NEXTAUTH_SECRET: "ci-e2e-stub-secret-not-real"
      NEXTAUTH_URL: "http://localhost:3000"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: burnless_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @burnless/web exec playwright install --with-deps chromium

      - name: Push database schema
        run: pnpm db:push

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.next

      - name: Run E2E tests
        run: pnpm --filter @burnless/web test:e2e
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: Upload E2E results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            apps/web/e2e/test-results
          retention-days: 7

  db-migrate-check:
    name: DB Migration Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: burnless_migrate_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/burnless_migrate_check"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify schema push succeeds
        run: pnpm db:push

      - name: Check for uncommitted schema changes
        run: |
          pnpm --filter @burnless/db db:generate
          if [ -n "$(git status --porcelain packages/db)" ]; then
            echo "::error::Uncommitted schema changes detected. Run 'pnpm db:generate' locally and commit the results."
            git diff packages/db
            exit 1
          fi
