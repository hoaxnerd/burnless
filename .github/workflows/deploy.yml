name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Gate: ensure CI passes before deploy
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    steps:
      - name: Trigger Vercel deployment
        run: |
          echo "Vercel GitHub integration handles deployment automatically."
          echo "This job gates on CI passing before the deploy webhook fires."
          echo "To enable: connect your repo in Vercel dashboard and set"
          echo "Git Integration > Ignored Build Step to only deploy when CI passes."
          echo ""
          echo "Alternatively, set up Vercel CLI deployment here:"
          echo "  npx vercel --prod --token=\$VERCEL_TOKEN"
